name: No-torch smoke test

# Proves that torchcodec can decode WITHOUT PyTorch installed: we build the
# torch-free core + pybind frontend (ENABLE_TORCH=OFF) in an environment that
# has NO torch, assert the built libraries link no torch, and run a smoke test
# that decodes a frame to a numpy array via DLPack.
#
# CPU decoding runs on a CPU runner (numpy output). GPU decoding without torch
# is covered by the no-torch-cuda-smoke job on a CUDA runner (cupy output).

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: no-torch-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -l -eo pipefail {0}

jobs:
  no-torch-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ffmpeg-version-for-tests: ['7']
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Setup conda env
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge-version: latest
          activate-environment: test
          python-version: '3.12'
      - name: Update pip
        run: python -m pip install --upgrade pip
      - name: Install build + runtime deps (deliberately NO torch)
        run: |
          conda install "ffmpeg=${{ matrix.ffmpeg-version-for-tests }}" pkg-config pybind11 numpy cmake setuptools pip cxx-compiler -c conda-forge
          ffmpeg -version
      - name: Assert torch is NOT installed
        run: |
          if python -c "import torch" 2>/dev/null; then
            echo "ERROR: torch is installed; this job must run torch-free."
            exit 1
          fi
          echo "torch is not installed (good)"
      - name: Build torch-free core + pybind frontend
        run: |
          build_dir="${PWD}/build_notorch"
          mkdir "$build_dir"
          pushd "$build_dir"
          cmake .. \
            -DENABLE_TORCH=OFF \
            -DENABLE_CUDA=0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DPYTHON_VERSION=3.12 \
            -DCMAKE_VERBOSE_MAKEFILE=ON
          cmake --build . -j
          popd
      - name: Assert the built libraries link no torch
        run: |
          so=$(find build_notorch -name "libtorchcodec_pybind_ops*.so" | head -1)
          echo "Checking $so"
          if ldd "$so" | grep -iE "libtorch[._]|libc10"; then
            echo "ERROR: torch is linked into the torch-free build!"
            exit 1
          fi
          echo "no torch linkage (good)"
      - name: Run torch-free (pybind-direct) smoke test
        run: |
          TORCHCODEC_LIB_DIR="${PWD}/build_notorch" python test/smoke_test_no_torch.py

      - name: Install torchcodec torch-free (pip, ENABLE_TORCH=0)
        run: |
          ENABLE_TORCH=0 ENABLE_CUDA=0 pip install -e . --no-build-isolation -v

      - name: Assert torch still not installed
        run: |
          if python -c "import torch" 2>/dev/null; then
            echo "ERROR: torch got installed."
            exit 1
          fi
          echo "torch is not installed (good)"

      - name: Run torch-free package smoke test (import torchcodec + VideoDecoder)
        run: |
          # Run from a different dir so we import the installed package, not ./src.
          cd "${RUNNER_TEMP:-/tmp}"
          python "${GITHUB_WORKSPACE}/test/smoke_test_no_torch_package.py"

  # Proves the SAME (torch-built) CPU install is runtime-optional: with torch it
  # returns torch tensors; after uninstalling torch it returns numpy.
  single-wheel-runtime-optional:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ffmpeg-version-for-tests: ['7']
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Setup conda env
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge-version: latest
          activate-environment: test
          python-version: '3.12'
      - name: Update pip
        run: python -m pip install --upgrade pip
      - name: Install deps + torch (CPU)
        run: |
          conda install "ffmpeg=${{ matrix.ffmpeg-version-for-tests }}" pkg-config pybind11 numpy cmake setuptools pip cxx-compiler -c conda-forge
          bash packaging/install_pytorch.sh cpu "torch"
      - name: Build the CPU wheel WITH torch (single-wheel config)
        run: |
          ENABLE_TORCH=1 ENABLE_CUDA=0 pip install -e . --no-build-isolation -v
      - name: Core must not link torch (so it loads torch-free)
        run: |
          so=$(find . -name "libtorchcodec_core*.so" | head -1)
          if ldd "$so" | grep -iE "libtorch[._]|libc10"; then
            echo "ERROR: CPU core links torch; the single wheel won't load torch-free."
            exit 1
          fi
          echo "core has no torch linkage (good)"
      - name: With torch present -> torch tensors; numpy bridge -> numpy
        run: |
          cd "${RUNNER_TEMP:-/tmp}"
          python - <<'PY'
          import os
          import torch, numpy as np, torchcodec
          from torchcodec.decoders import VideoDecoder
          p = os.path.join(os.environ["GITHUB_WORKSPACE"], "test/resources/nasa_13013.mp4")
          d = VideoDecoder(p)
          assert isinstance(d[0], torch.Tensor), type(d[0])
          torchcodec.set_bridge("numpy")
          assert isinstance(d[0], np.ndarray), type(d[0])
          print("with torch: torch tensor + numpy bridge OK")
          PY
      - name: Uninstall torch, then the SAME install must decode to numpy
        run: |
          pip uninstall -y torch
          if python -c "import torch" 2>/dev/null; then echo "torch still present"; exit 1; fi
          cd "${RUNNER_TEMP:-/tmp}"
          python "${GITHUB_WORKSPACE}/test/smoke_test_no_torch_package.py"

  # Proves GPU decoding works WITHOUT torch: build ENABLE_CUDA=1 ENABLE_TORCH=0
  # in a torch-free env that has the CUDA toolkit (conda nvcc) + cupy as the
  # DLPack consumer, then decode on the GPU to cupy arrays.
  no-torch-cuda-smoke:
    runs-on: linux.g5.4xlarge.nvidia.gpu
    strategy:
      fail-fast: false
      matrix:
        ffmpeg-version-for-tests: ['7']
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Setup conda env
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge-version: latest
          activate-environment: test
          python-version: '3.12'
      - name: Update pip
        run: python -m pip install --upgrade pip
      - name: Install build + runtime deps incl. CUDA toolkit (deliberately NO torch)
        run: |
          # cuda-nvrtc: cupy JIT-compiles a kernel for any real op (even copying
          # our non-contiguous CHW frames to host), and cupy-cuda12x does NOT
          # bundle the NVRTC runtime -- it expects it from the CUDA install.
          conda install "ffmpeg=${{ matrix.ffmpeg-version-for-tests }}" pkg-config pybind11 numpy cmake setuptools pip cxx-compiler cuda-nvcc cuda-cudart-dev cuda-nvrtc cuda-version=12.6 -c conda-forge -c nvidia
          python -m pip install cupy-cuda12x
          nvidia-smi
          ffmpeg -version | head -1
      - name: Assert torch is NOT installed
        run: |
          if python -c "import torch" 2>/dev/null; then
            echo "ERROR: torch is installed; this job must run torch-free."
            exit 1
          fi
          echo "torch is not installed (good)"
      - name: Build + install torchcodec torch-free CUDA (ENABLE_TORCH=0 ENABLE_CUDA=1)
        run: |
          # g5 runners are A10G (compute 8.6); set the arch explicitly so the
          # build doesn't depend on native detection. Force the conda CUDA
          # toolchain (PATH may also expose a system nvcc).
          export PKG_CONFIG_PATH="$CONDA_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"
          export CUDAARCHS=86
          export CUDACXX="$CONDA_PREFIX/bin/nvcc"
          export CUDAHOSTCXX="$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-g++"
          ENABLE_TORCH=0 ENABLE_CUDA=1 pip install -e . --no-build-isolation -v
      - name: Core must not link torch
        run: |
          so=$(find . -name "libtorchcodec_core*.so" | head -1)
          if ldd "$so" | grep -iE "libtorch[._]|libc10"; then
            echo "ERROR: torch is linked into the torch-free CUDA build!"
            exit 1
          fi
          echo "no torch linkage (good)"
      - name: Run torch-free CUDA smoke test (decode to cupy on GPU)
        run: |
          # Ensure cupy's pathfinder can locate the conda-installed libnvrtc.so.
          export LD_LIBRARY_PATH="$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
          cd "${RUNNER_TEMP:-/tmp}"
          python "${GITHUB_WORKSPACE}/test/smoke_test_no_torch_cuda.py"
