# Companion to build_ffmpeg.yaml, for libavif instead of FFmpeg.
# This job builds a *decode-only* libavif (dav1d statically embedded, no encoders
# and no CLI apps) from source, which we upload to S3 and then link against
# during wheel builds (see src/torchcodec/_core/fetch_avif_from_s3.cmake). This
# lets us bundle a tiny self-contained libavif.so instead of conda-forge's
# libavif, which drags in ~20MB of unused AV1 encoder libraries.
#
# Unlike FFmpeg there is no version matrix: libavif is a single version, so the
# matrix is platforms only.
#
# This job does not include the uploading part.
# Upload needs to be done manually, and it should be done only once per new
# libavif version.
name: Build decode-only libavif from source

on:
  workflow_dispatch:
  pull_request:
    paths:
      - packaging/build_libavif.sh
      - packaging/build_libavif.bat
      - .github/workflows/build_libavif.yaml # self reference
  schedule:
    - cron: '0 0 * * 0'  # on sunday

defaults:
  run:
    shell: bash -l -eo pipefail {0}

env:
  LIBAVIF_VERSION: "1.4.2"

jobs:
  libavif-Linux-x86_64:
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      job-name: Build
      upload-artifact: libavif-linux_x86_64-1.4.2
      repository: meta-pytorch/torchcodec
      script: |
        export LIBAVIF_VERSION="1.4.2"
        export LIBAVIF_ROOT="${PWD}/libavif"

        packaging/build_libavif.sh

        tar -cf libavif.tar.gz libavif/include libavif/lib libavif/licenses

        artifact_dir="${RUNNER_ARTIFACT_DIR}/$(date +%Y-%m-%d)/linux_x86_64"
        mkdir -p "${artifact_dir}"
        mv libavif.tar.gz "${artifact_dir}/${LIBAVIF_VERSION}.tar.gz"

  libavif-Linux-aarch64:
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      job-name: Build
      upload-artifact: libavif-linux_aarch64-1.4.2
      repository: meta-pytorch/torchcodec
      runner: linux.arm64.2xlarge
      docker-image: pytorch/manylinux2_28_aarch64-builder:cpu-aarch64
      script: |
        export LIBAVIF_VERSION="1.4.2"
        export LIBAVIF_ROOT="${PWD}/libavif"

        packaging/build_libavif.sh

        tar -cf libavif.tar.gz libavif/include libavif/lib libavif/licenses

        artifact_dir="${RUNNER_ARTIFACT_DIR}/$(date +%Y-%m-%d)/linux_aarch64"
        mkdir -p "${artifact_dir}"
        mv libavif.tar.gz "${artifact_dir}/${LIBAVIF_VERSION}.tar.gz"

  libavif-macOS:
    uses: pytorch/test-infra/.github/workflows/macos_job.yml@main
    with:
      job-name: Build
      upload-artifact: libavif-macos-1.4.2
      repository: meta-pytorch/torchcodec
      runner: macos-14-xlarge
      script: |
        export LIBAVIF_VERSION="1.4.2"
        export LIBAVIF_ROOT="${PWD}/libavif"

        packaging/build_libavif.sh

        tar -cf libavif.tar.gz libavif/include libavif/lib libavif/licenses

        artifact_dir="${RUNNER_ARTIFACT_DIR}/$(date +%Y-%m-%d)/macos_$(uname -m)"
        mkdir -p "${artifact_dir}"
        mv libavif.tar.gz "${artifact_dir}/${LIBAVIF_VERSION}.tar.gz"

  libavif-Windows:
    uses: pytorch/test-infra/.github/workflows/windows_job.yml@main
    with:
      job-name: Build
      upload-artifact: libavif-windows_x86_64-1.4.2
      repository: meta-pytorch/torchcodec
      script: |
        export LIBAVIF_VERSION="1.4.2"
        export LIBAVIF_ROOT="${PWD}/libavif"

        packaging/build_libavif.bat

        # Include lib (import lib) and bin (DLL) so the consumer has both.
        tar -cf libavif.tar.gz libavif/include libavif/lib libavif/bin libavif/licenses

        artifact_dir="${RUNNER_ARTIFACT_DIR}/$(date +%Y-%m-%d)/windows_$(uname -m)"
        mkdir -p "${artifact_dir}"
        mv libavif.tar.gz "${artifact_dir}/${LIBAVIF_VERSION}.tar.gz"
